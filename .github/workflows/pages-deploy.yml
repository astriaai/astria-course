name: Deploy Pages site

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout published artifacts
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .nojekyll
            index.html
            app.js
            style.css
            manifest.json
            thumbs
            videos

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble public artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          for f in .nojekyll index.html app.js style.css manifest.json; do
            [ -f "$f" ] && cp "$f" "_site/$f"
          done
          [ -d thumbs ] && cp -a thumbs _site/thumbs
          [ -d videos ] && cp -a videos _site/videos

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
