narration: |
  Two things to know.

  When to use it. Face portraits, fashion, beauty — anywhere there
  is a human face in the frame, you turn Inpaint faces on for a
  more authentic look. It is the difference between a face that
  reads as a person and a face that reads as a render.

  What stays the same. Pose, wardrobe, lighting, and the camera
  notes you wrote into the prompt all hold. Only the face area is
  rebuilt. Identity references stay pinned, so the person you
  chose is the person Astria keeps.

