narration: |
  To edit the direction, stay in the same chat. Do not start over.

  Ask for one clear change: make the same fashion video more moody,
  darker, outdoor, and surrounded by greenery.

  The assistant keeps the context, writes a new artboard prompt, and
  creates a refined grid. This is the loop: create, inspect, then ask
  for a focused change.
