narration: |
  Two more things to know.

  First — max duration is fifteen seconds per clip. For longer videos,
  just concat several clips together.

  Second — prompting. Describe what's happening in the scene: the motion
  or actions, the background — for example, plain white background.
  Keywords like natural relaxed pose, fumbling her eyes, micro-expressions,
  help the model land the look.
