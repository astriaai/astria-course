# Master script — ordered list of segments + global defaults.
# Each entry references a file under script/segments/<id>.yaml.

meta:
  title: "Scaling Fashion Lookbooks with Astria"
  presenter: "Yuli (Astria)"
  resolution: "1920x1080"
  fps: 30

defaults:
  # Gemini 3.1 Flash TTS via Google AI Studio (VERTEX_API_KEY).
  # Voice catalog: Aoede, Kore, Puck, Charon, Fenrir, Zephyr, etc.
  # Override TTS_PROVIDER=inworld (requires WAVESPEED_API_KEY) for the legacy
  # backend. macOS `say` is the zero-config fallback.
  tts:
    provider: "gemini"
    voice: "Aoede"
    model: "gemini-3.1-flash-tts-preview"
    # Legacy Inworld settings (honored only when provider=inworld):
    voice_id: "Olivia"
    speaking_rate: 1.0
  # HeyGen stock avatar — Avatar IV will lipsync to the Inworld audio if both keys are set.
  # Note: Gemini TTS has no hosted URL, so avatar lipsync is only available
  # on the Inworld path. Keep NO_AVATAR=1 or switch TTS_PROVIDER=inworld
  # when you want talking-head rendering.
  avatar:
    avatar_id: "Daisy-inskirt-20220818"
    voice_id: "1bd001e7e50f421d891986aad5158bc8"   # fallback HeyGen voice when Inworld not used
    emotion: "friendly"
    # Pruna only — directs micro-motions, expressions, gestures.
    # Per-segment avatar.video_prompt overrides this default.
    video_prompt: >-
      A confident woman speaks with natural micro-expressions, occasional
      gentle head movements, eyes engaged with the camera, slight smile when
      emphasising key points, hands gesturing subtly within frame.

segments:
  - 01-opening
  - 02-outline
  - 03-traditional-photoshoot
  - 04-brands-verticals
  - 05-real-world-examples         # → sacksfashion.com + ronnykobo.com + Mango/H&M/Zara
  - 06-brand-implementations       # → astria.ai/w/{zara,great-sports,america-basics}
  - 07-platform-partner            # 22:19-30:35 — brands need a partner, model churn, Brief, set-of-templates
  - 08-start-creating              # 31:00-32:40 — "your turn, open a workspace"
  - 09a-open-workspace             # Astria: open Workspace selector → New → name "Bobo Choses"
  - 09b-brand-research             # bobochoses.com pages, panned (static screenshots — no live recording)
  - 09c-technicalities             # model, resolution, aspect, count (overview before building)
  - 09d-build-look                 # cube-by-cube Lookbook builder
  - 10-refine-and-templatize       # 58:00-1:12 — prompt bugs, Describe tool, templatize & deliver
  - 11-templates-concept
  - 12-closing
