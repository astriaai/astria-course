<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0B0B0C;
        font-family: "Inter", system-ui, sans-serif;
        color: #F4F1EC;
      }

      /* Browser mock — default 3/4 canvas width, left-aligned. Keeps the
         "this is a real website" framing; the right-side column hosts the
         presenter PIP and breathing room. Segments with bullets use the
         .with-bullets variant, which narrows the browser to 2/3 so the
         right column has room for a bullet list beneath the caption. */
      #seg-browser {
        position: absolute;
        top: 40px;
        left: 40px;
        width: 1440px;      /* ≈ 3/4 of 1920 */
        height: 1000px;
        border-radius: 16px;
        overflow: hidden;
        background: #FFFFFF;
        box-shadow: 0 32px 80px rgba(0,0,0,0.55);
        z-index: 1;
        display: flex;
        flex-direction: column;
      }
      #seg-browser.with-bullets {
        width: 1200px;      /* 2/3 of 1920 — leaves 680 px for right column */
      }
      .browser-chrome {
        height: 44px;
        background: #1E1D1C;
        display: flex;
        align-items: center;
        padding: 0 18px;
        gap: 8px;
        flex-shrink: 0;
      }
      .browser-dot { width: 12px; height: 12px; border-radius: 50%; }
      .browser-dot.red    { background: #FF5F57; }
      .browser-dot.yellow { background: #FEBC2E; }
      .browser-dot.green  { background: #28C840; }
      .browser-url {
        margin-left: 14px;
        background: #0B0B0C;
        color: #A8A39A;
        font-size: 13px;
        padding: 7px 14px;
        border-radius: 7px;
        min-width: 460px;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .browser-url .lock { opacity: 0.6; margin-right: 8px; }
      .browser-viewport {
        position: relative;
        flex: 1;
        overflow: hidden;
        background: #000000;
      }
      .browser-viewport img,
      .browser-viewport video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* contain, not cover — the Playwright capture is 16:9 (1600×900) while
           the mock browser viewport isn't; cover would crop the left/right
           edges (e.g. truncating "Mango" in the big-players gallery). */
        object-fit: contain;
        background: #0B0B0C;
        display: block;
      }
      /* Multi-page mode default: fit the image fully in the viewport.
         Individual lookbook screenshots (1500×2000) should show whole; only
         tall composites that need to scroll opt in via data-scroll="1". */
      .browser-viewport img.seg-screenshot-page {
        object-fit: contain;
      }
      /* Scroll mode (single composite #seg-screenshot or per-page opt-in):
         fill viewport WIDTH and overflow vertically so GSAP can pan through. */
      .browser-viewport img#seg-screenshot,
      .browser-viewport img.seg-screenshot-page[data-scroll="1"] {
        width: 100%;
        height: auto;
        object-fit: unset;
      }

      /* Right column (x≈1480→1920, minus 40 px gutters):
         — top: caption (eyebrow + headline)
         — middle (optional): bullets
         — bottom: presenter PIP
         The .with-bullets layout moves the avatar down and narrows its width
         to make room for the bullets list above it. */
      #seg-avatar {
        position: absolute;
        bottom: 60px;
        right: 40px;
        width: 360px;
        height: 500px;
        border-radius: 18px;
        background: #1E1D1C;
        overflow: hidden;
        box-shadow: 0 20px 48px rgba(0,0,0,0.6), 0 0 0 2px rgba(244, 241, 236, 0.08);
        z-index: 3;
      }
      #seg-avatar.with-bullets {
        width: 300px;
        height: 360px;
        bottom: 60px;
      }
      #seg-avatar video { width: 100%; height: 100%; object-fit: cover; display: block; }
      .avatar-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: radial-gradient(circle at 50% 40%, #2a2927 0%, #121211 70%); }
      .avatar-ring { width: 150px; height: 150px; border-radius: 50%; border: 2px solid #A8A39A; position: relative; }
      .avatar-ring::after { content: ""; position: absolute; inset: 12px; border-radius: 50%; background: radial-gradient(circle at 50% 45%, #3a3938 0%, #1b1a19 80%); }
      .avatar-label { font-size: 13px; letter-spacing: 0.18em; text-align: center; color: #A8A39A; font-weight: 600; }
      .avatar-label span { display: block; margin-top: 6px; font-size: 17px; letter-spacing: -0.01em; color: #F4F1EC; font-weight: 400; }

      /* Caption stack — top of right column, above the presenter PIP. */
      #seg-caption {
        position: absolute;
        top: 80px;
        right: 40px;
        width: 360px;
        z-index: 3;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      #seg-caption.with-bullets {
        width: 600px;
      }
      .caption-eyebrow {
        font-size: 16px;
        letter-spacing: 0.32em;
        color: #A8A39A;
        font-weight: 500;
        padding-left: 24px;
        position: relative;
      }
      .caption-eyebrow::before {
        content: "";
        position: absolute;
        left: 0; top: 10px;
        width: 16px; height: 1px; background: #E06A4E;
      }
      .caption-text {
        font-size: 30px;
        line-height: 1.18;
        font-weight: 600;
        letter-spacing: -0.015em;
        color: #F4F1EC;
      }
      .caption-text .accent { color: #E06A4E; }

      /* Bullets under the caption (optional — only rendered when the yaml
         segment provides caption.bullets or slide.bullets alongside a
         screencast-pip visual). */
      #seg-bullets {
        position: absolute;
        top: 280px;
        right: 40px;
        width: 600px;
        z-index: 3;
      }
      .pip-bullets {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .pip-bullets li {
        font-size: 24px;
        line-height: 1.32;
        color: #F4F1EC;
        font-weight: 400;
        padding-left: 34px;
        position: relative;
      }
      .pip-bullets li::before {
        content: "";
        position: absolute;
        left: 0; top: 15px;
        width: 20px; height: 1px; background: #A8A39A;
      }
      .pip-bullets li.accent {
        color: #E06A4E;
      }

      /* Simulated cursor */
      #seg-cursor {
        position: absolute;
        width: 28px;
        height: 28px;
        z-index: 4;
        pointer-events: none;
        /* SVG arrow cursor */
        background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23F4F1EC' stroke='%230B0B0C' stroke-width='1' d='M3 2 L3 18 L7 14 L9 20 L12 19 L10 13 L16 13 Z'/></svg>") center / contain no-repeat;
        filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        opacity: 0;
      }
      {{CAPTIONS_CSS}}
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="{{DURATION}}" data-width="1920" data-height="1080">
      <audio id="seg-narration" class="clip" data-start="0" data-duration="{{DURATION}}" data-track-index="0" src="{{AUDIO_SRC}}" data-volume="1"></audio>

      <!-- Browser mock hosting the recorded screen capture (3/4 width, left). -->
      <div id="seg-browser" class="clip {{PIP_VARIANT_CLASS}}" data-start="0" data-duration="{{DURATION}}" data-track-index="1">
        <div class="browser-chrome">
          <div class="browser-dot red"></div>
          <div class="browser-dot yellow"></div>
          <div class="browser-dot green"></div>
          <div class="browser-url"><span class="lock">🔒</span><span id="browser-url-text">{{BROWSER_URL}}</span></div>
        </div>
        <div class="browser-viewport">
          {{SCREENCAST_MEDIA}}
        </div>
      </div>

      <!-- Caption overlay -->
      <div id="seg-caption" class="clip {{PIP_VARIANT_CLASS}}" data-start="0" data-duration="{{DURATION}}" data-track-index="2">
        <div class="caption-eyebrow" id="caption-eyebrow">{{CAPTION_EYEBROW}}</div>
        <div class="caption-text" id="caption-text">{{CAPTION_HTML}}</div>
      </div>

      <!-- Optional bullets (right column, below caption). Empty when unused. -->
      <div id="seg-bullets" class="clip" data-start="0" data-duration="{{DURATION}}" data-track-index="5">
        {{PIP_BULLETS_HTML}}
      </div>

      <!-- Cursor (animated via GSAP) -->
      <div id="seg-cursor" class="clip" data-start="0" data-duration="{{DURATION}}" data-track-index="3"></div>

      <!-- Avatar PIP -->
      <div id="seg-avatar" class="clip {{PIP_VARIANT_CLASS}}" data-start="0" data-duration="{{DURATION}}" data-track-index="4">
        {{AVATAR_MEDIA}}
      </div>

      {{CAPTIONS_HTML}}
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const duration = {{DURATION}};

      // Browser slides in from the left
      tl.from("#seg-browser", { opacity: 0, x: -60, duration: 0.9, ease: "power3.out" }, 0.2);
      // Caption staggers in over browser
      tl.from("#caption-eyebrow", { opacity: 0, x: -20, duration: 0.5, ease: "power2.out" }, 0.7);
      tl.from("#caption-text",    { opacity: 0, y: 20, duration: 0.7, ease: "expo.out"   }, 0.85);
      // Optional caption fade-out — set when yaml provides caption.hide_at.
      const captionHideAt = "{{CAPTION_HIDE_AT}}";
      if (captionHideAt) {
        const t = parseFloat(captionHideAt);
        tl.to("#seg-caption", { opacity: 0, duration: 0.6, ease: "power2.in" }, t);
      }
      // Avatar PIP bounces in from bottom
      tl.from("#seg-avatar", { opacity: 0, y: 60, scale: 0.9, duration: 0.8, ease: "power3.out" }, 1.1);

      // Optional: per-bullet reveal (honors data-start if provided).
      const pipBullets = Array.from(document.querySelectorAll(".pip-bullets li"));
      if (pipBullets.length) {
        const hasPaced = pipBullets.some((li) => li.dataset.start !== undefined);
        if (hasPaced) {
          pipBullets.forEach((li) => {
            const t = parseFloat(li.dataset.start ?? "0");
            tl.from(li, { opacity: 0, x: 40, duration: 0.55, ease: "power2.out" }, t);
          });
        } else {
          tl.from(".pip-bullets li", { opacity: 0, x: 40, duration: 0.55, ease: "power2.out", stagger: 0.4 }, 1.3);
        }
      }

      // For image-backed demos we pan; for video-backed demos the recording handles motion.
      // Single-page mode (#seg-screenshot): pan one image; defaults to
      // max(2400, renderedHeight − viewportHeight) over duration − 3 s.
      // Multi-page mode (.seg-screenshot-page): each image has data-start /
      // data-duration controlling visibility, plus optional per-page pan
      // overrides. We tween each page within its own window so the
      // narration can walk through several screens.
      const panSingle = (img) => {
        const viewport = img.closest(".browser-viewport");
        const overrideSeconds = parseFloat(img.dataset.panSeconds ?? "");
        const overrideDistance = parseFloat(img.dataset.panDistance ?? "");
        const computePan = () => {
          const visibleH = viewport ? viewport.clientHeight : 900;
          const renderedH = img.offsetHeight || img.naturalHeight || 0;
          return Math.max(2400, renderedH - visibleH);
        };
        const dist = Number.isFinite(overrideDistance) ? overrideDistance : computePan();
        const secs = Number.isFinite(overrideSeconds) ? overrideSeconds : Math.max(duration - 3, 4);
        return { dist, secs };
      };

      const singleImg = document.getElementById("seg-screenshot");
      if (singleImg) {
        const tween = () => {
          const { dist, secs } = panSingle(singleImg);
          tl.to(singleImg, { y: -dist, duration: secs, ease: "none" }, 1.6);
        };
        if (singleImg.complete && singleImg.offsetHeight) tween();
        else singleImg.addEventListener("load", tween, { once: true });
      }

      const pages = document.querySelectorAll(".seg-screenshot-page");
      if (pages.length) {
        const urlText = document.getElementById("browser-url-text");
        pages.forEach((img) => {
          const start = parseFloat(img.dataset.start ?? "0");
          const dur = parseFloat(img.dataset.duration ?? "0");
          const pageUrl = img.dataset.url ?? "";
          // Default pan: 70% of the page window, distance = renderedHeight − viewportHeight.
          const overrideSeconds = parseFloat(img.dataset.panSeconds ?? "");
          const overrideDistance = parseFloat(img.dataset.panDistance ?? "");
          const tween = () => {
            const viewport = img.closest(".browser-viewport");
            const visibleH = viewport ? viewport.clientHeight : 900;
            const renderedH = img.offsetHeight || img.naturalHeight || 0;
            const computed = Math.max(0, renderedH - visibleH);
            const dist = Number.isFinite(overrideDistance) ? overrideDistance : computed;
            const secs = Number.isFinite(overrideSeconds) ? overrideSeconds : Math.max(dur - 1.5, 1);
            // Reset y at page start so the pan begins from the top each time.
            tl.set(img, { y: 0 }, start);
            tl.to(img, { y: -dist, duration: secs, ease: "none" }, start + 0.4);
            // Swap the URL bar text when this page becomes active.
            if (urlText && pageUrl) {
              tl.call(() => { urlText.textContent = pageUrl; }, [], start);
            }
          };
          if (img.complete && img.offsetHeight) tween();
          else img.addEventListener("load", tween, { once: true });
        });
      }

      // Simulated cursor animation — only relevant for image-backed demos.
      // Real Playwright recordings already include a genuine cursor.
      if (document.getElementById("seg-screenshot")) {
        tl.set("#seg-cursor", { x: 1400, y: 200, opacity: 0 }, 0);
        tl.to("#seg-cursor", { opacity: 1, duration: 0.3 }, 2.0);
        tl.to("#seg-cursor", { x: 920, y: 360, duration: 1.4, ease: "power2.inOut" }, 2.2);
        tl.to("#seg-cursor", { scale: 0.85, duration: 0.1 }, 3.6);
        tl.to("#seg-cursor", { scale: 1.0,  duration: 0.15 }, 3.7);
        tl.to("#seg-cursor", { opacity: 0, duration: 0.4 }, 4.4);
      }

      {{CAPTIONS_GSAP}}
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
