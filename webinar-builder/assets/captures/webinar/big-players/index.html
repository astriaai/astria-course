<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Big players · AI campaigns</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #0B0B0C;
      color: #F4F1EC;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
      min-height: 100vh;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 32px 48px 0;
    }
    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.32em;
      color: #A8A39A;
      text-transform: uppercase;
      font-weight: 500;
      padding-left: 24px;
      position: relative;
    }
    .eyebrow::before {
      content: "";
      position: absolute;
      left: 0; top: 7px;
      width: 16px; height: 1px; background: #E06A4E;
    }
    .title {
      font-size: 38px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-top: 10px;
    }
    .title .accent { color: #E06A4E; }
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      padding: 28px 48px 48px;
      min-height: 0;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }
    .card .frame {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.45);
      background: #1E1D1C;
    }
    .card .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      animation: fadeInZoom 1.4s ease-out both;
    }
    .card:nth-child(2) .frame img { animation-delay: 0.18s; }
    .card:nth-child(3) .frame img { animation-delay: 0.36s; }
    .card .label {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #F4F1EC;
    }
    @keyframes fadeInZoom {
      0%   { opacity: 0; transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1.0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="eyebrow">Big players · campaigns &amp; lookbooks</div>
    <div class="title">Mango · H&amp;M · <span class="accent">Zara</span> — all in AI</div>
  </div>
  <div class="grid">
    <div class="card"><div class="frame"><img src="mango.jpg" alt="Mango campaign"></div><div class="label">Mango</div></div>
    <div class="card"><div class="frame"><img src="hm.jpg" alt="H&amp;M campaign"></div><div class="label">H&amp;M</div></div>
    <div class="card"><div class="frame"><img src="zara.jpg" alt="Zara campaign"></div><div class="label">Zara</div></div>
  </div>
</body>
</html>
