<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The platform is the partner · 03c</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0B0B0C;
      color: #F4F1EC;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
      overflow: hidden;
    }
    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 80px 110px;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(60% 50% at 20% 25%, rgba(224, 106, 78, 0.11) 0%, transparent 65%),
        #1E1D1C;
    }
    .eyebrow {
      font-size: 18px;
      letter-spacing: 0.32em;
      color: #A8A39A;
      font-weight: 500;
      padding-left: 28px;
      position: relative;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      position: absolute;
      left: 0; top: 11px;
      width: 20px; height: 1px; background: #E06A4E;
    }
    .title {
      font-size: 86px;
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: -0.025em;
      max-width: 1200px;
      margin-top: 32px;
    }
    .title .accent { color: #E06A4E; }
    .bullets {
      list-style: none;
      margin-top: 64px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .bullets li {
      font-size: 32px;
      line-height: 1.3;
      color: #F4F1EC;
      font-weight: 400;
      padding-left: 44px;
      position: relative;
      opacity: 0;
      transform: translateX(-16px);
      animation: enter 0.9s ease-out both;
    }
    .bullets li:nth-child(1) { animation-delay: 1.8s; }
    .bullets li:nth-child(2) { animation-delay: 16.5s; }
    .bullets li::before {
      content: "";
      position: absolute;
      left: 0; top: 22px;
      width: 26px; height: 1px; background: #A8A39A;
    }
    .footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 16px;
      letter-spacing: 0.2em;
      color: #A8A39A;
      font-weight: 500;
      text-transform: uppercase;
    }
    .dot { width: 4px; height: 4px; background: #A8A39A; border-radius: 50%; }
    @keyframes enter {
      0%   { opacity: 0; transform: translateX(-16px); }
      100% { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div>
      <div class="eyebrow">Method · 03c</div>
      <h1 class="title">
        Brands don't need to learn AI —
        <span class="accent">we abstract it</span>.
      </h1>
    </div>
    <ul class="bullets">
      <li>Brands need help navigating AI</li>
      <li>Models keep changing — Flux LoRA → Nano Banana → Nano Banana 2 → …</li>
    </ul>
    <div class="footer">
      <span>Astria</span><span class="dot"></span><span>Scaling Fashion Lookbooks</span>
    </div>
  </div>
</body>
</html>
